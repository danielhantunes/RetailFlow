# RetailFlow - Development Environment Configuration
# Used by notebooks, jobs, and CI/CD for environment-specific settings

environment: dev
databricks:
  workspace_url: https://adb-xxxx.azuredatabricks.net
  workspace_id: "123456789"
# Storage: default dev account from terraform/adls (retailflowdevdls). Override per deployment.
# Postgres → RAW writes to the RAW container on this account; Bronze reads the same base.
storage:
  account_name: retailflowdevdls
  container_raw: raw
  # ADLS terraform default filesystems: raw, bronze, silver, gold (no separate "processed" container).
  container_processed: bronze
  base_path: abfss://raw@retailflowdevdls.dfs.core.windows.net
catalog:
  name: retailflow_dev
  raw_schema: raw
  bronze_schema: bronze
  silver_schema: silver
  gold_schema: gold
key_vault:
  name: retailflow-dev-kv
  secret_scope: retailflow-keyvault
ingestion:
  orders_api_base_url: https://api-dev.retail.example.com/orders
  customers_api_base_url: https://api-dev.retail.example.com/customers
  batch_size: 1000
  watermark_column: updated_at
