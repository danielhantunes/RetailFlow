# Layer 1 – Base Infrastructure ONLY (dev)
# This workflow manages ONLY base infrastructure: Resource Group, VNet, Subnets, ADLS Gen2 (retailflowdevdls), Private Endpoint.
# No compute or Databricks here. Databricks is in terraform-databricks-dev.yml.

name: Terraform Base (Dev)
on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action'
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
        default: plan

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-base-dev-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_VERSION: '1.5.0'
  ARM_USE_OIDC: true
  # Remote state backend (dev)
  TF_BACKEND_RESOURCE_GROUP: retailflow-dev-tfstate-rg
  TF_BACKEND_STORAGE_ACCOUNT: retailflowdevtfstate
  TF_BACKEND_CONTAINER: tfstate
  TF_BACKEND_KEY: retailflow-dev-base.tfstate

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/base
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          echo "==> Initializing Terraform (backend: $TF_BACKEND_RESOURCE_GROUP / $TF_BACKEND_KEY)"
          terraform init \
            -backend-config="resource_group_name=$TF_BACKEND_RESOURCE_GROUP" \
            -backend-config="storage_account_name=$TF_BACKEND_STORAGE_ACCOUNT" \
            -backend-config="container_name=$TF_BACKEND_CONTAINER" \
            -backend-config="key=$TF_BACKEND_KEY"

      - name: Terraform Validate
        run: |
          echo "==> Validating configuration"
          terraform validate

      - name: Terraform Plan
        if: github.event.inputs.action == 'plan' || github.event.inputs.action == 'apply'
        run: |
          echo "==> Running terraform plan"
          terraform plan -no-color -input=false

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: |
          echo "==> Applying base infrastructure"
          terraform apply -auto-approve -no-color -input=false

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: |
          echo "==> Destroying base infrastructure"
          terraform destroy -auto-approve -no-color -input=false
