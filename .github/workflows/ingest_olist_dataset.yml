# Olist ingestion: Terraform plan/apply/destroy or full run (apply → load CSVs → destroy).
# Uses existing Azure OIDC. State in Azure (same backend as dev). POSTGRES_* from Terraform outputs only.

name: Ingest Brazilian E-Commerce Public Dataset
on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action or full ingest'
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
          - full
        default: plan

permissions:
  id-token: write
  contents: read

concurrency:
  group: ingest-olist-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_VERSION: "1.5.0"
  ARM_USE_OIDC: true
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  # Remote state backend (same storage as dev; separate state key)
  TF_BACKEND_RESOURCE_GROUP: retailflow-dev-tfstate-rg
  TF_BACKEND_STORAGE_ACCOUNT: retailflowdevtfstate
  TF_BACKEND_CONTAINER: tfstate
  TF_BACKEND_KEY: retailflow-ingest-pg.tfstate

jobs:
  ingest:
    name: Terraform ${{ github.event.inputs.action }}
    runs-on: ubuntu-latest
    env:
      ARM_USE_OIDC: ${{ env.ARM_USE_OIDC }}
      ARM_CLIENT_ID: ${{ env.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ env.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ env.ARM_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init (PostgreSQL)
        working-directory: terraform/postgres
        run: |
          echo "==> Initializing Terraform (backend: $TF_BACKEND_RESOURCE_GROUP / $TF_BACKEND_KEY)"
          terraform init \
            -backend-config="resource_group_name=$TF_BACKEND_RESOURCE_GROUP" \
            -backend-config="storage_account_name=$TF_BACKEND_STORAGE_ACCOUNT" \
            -backend-config="container_name=$TF_BACKEND_CONTAINER" \
            -backend-config="key=$TF_BACKEND_KEY"

      - name: Terraform Validate
        working-directory: terraform/postgres
        run: terraform validate

      - name: Terraform Plan
        if: github.event.inputs.action == 'plan' || github.event.inputs.action == 'apply' || github.event.inputs.action == 'full'
        working-directory: terraform/postgres
        run: terraform plan -no-color -input=false

      - name: Terraform Apply (Create Azure PostgreSQL)
        if: github.event.inputs.action == 'apply' || github.event.inputs.action == 'full'
        working-directory: terraform/postgres
        run: terraform apply -auto-approve -no-color -input=false

      - name: Export PostgreSQL connection from Terraform outputs
        if: github.event.inputs.action == 'full'
        working-directory: terraform/postgres
        run: |
          echo "POSTGRES_HOST=$(terraform output -raw postgres_host)" >> $GITHUB_ENV
          echo "POSTGRES_DB=$(terraform output -raw postgres_db)" >> $GITHUB_ENV
          echo "POSTGRES_USER=$(terraform output -raw postgres_user)" >> $GITHUB_ENV
          echo "POSTGRES_PASSWORD=$(terraform output -raw postgres_password)" >> $GITHUB_ENV

      - name: Wait for PostgreSQL to accept connections
        if: github.event.inputs.action == 'full'
        run: |
          for i in $(seq 1 30); do
            if python3 -c "
          import os, sys
          import socket
          s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
          s.settimeout(5)
          try:
            host = os.environ['POSTGRES_HOST']
            s.connect((host, 5432))
            s.close()
            sys.exit(0)
          except Exception:
            sys.exit(1)
          " 2>/dev/null; then echo "PostgreSQL is reachable"; break; fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 10
          done

      - name: Unzip dataset
        if: github.event.inputs.action == 'full'
        run: bash scripts/unzip_dataset.sh

      - name: Install Python dependencies for ingestion
        if: github.event.inputs.action == 'full'
        run: pip install -r scripts/requirements-ingest.txt

      - name: Create tables and load CSV (COPY)
        if: github.event.inputs.action == 'full'
        run: python3 scripts/load_csv_to_postgres.py
        env:
          POSTGRES_HOST: ${{ env.POSTGRES_HOST }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          DATASET_DIR: dataset

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy' || github.event.inputs.action == 'full'
        working-directory: terraform/postgres
        run: terraform destroy -auto-approve -no-color -input=false
