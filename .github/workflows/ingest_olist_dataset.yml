# Olist ingestion: Terraform plan/apply/destroy or full (apply only). PostgreSQL is private only (base VNet); run ingestion from Databricks.
# Uses existing Azure OIDC and base state. Run Terraform Base (Dev) apply first.

name: Ingest Brazilian E-Commerce Public Dataset
on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action or full (apply only)'
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
          - full
        default: plan

permissions:
  id-token: write
  contents: read

concurrency:
  group: ingest-olist-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_VERSION: "1.5.0"
  ARM_USE_OIDC: true
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  # Remote state backend (same storage as dev; separate state key)
  TF_BACKEND_RESOURCE_GROUP: retailflow-dev-tfstate-rg
  TF_BACKEND_STORAGE_ACCOUNT: retailflowdevtfstate
  TF_BACKEND_CONTAINER: tfstate
  TF_BACKEND_KEY: retailflow-ingest-pg.tfstate
  # Read base state (delegated subnet + private DNS). Run Terraform Base (Dev) apply first.
  TF_VAR_tfstate_resource_group_name: retailflow-dev-tfstate-rg
  TF_VAR_tfstate_storage_account_name: retailflowdevtfstate
  TF_VAR_tfstate_container_name: tfstate
  TF_VAR_tfstate_base_key: retailflow-dev-base.tfstate

jobs:
  ingest:
    name: Terraform ${{ github.event.inputs.action }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init (PostgreSQL)
        working-directory: terraform/postgres
        run: |
          echo "==> Initializing Terraform (backend: $TF_BACKEND_RESOURCE_GROUP / $TF_BACKEND_KEY)"
          terraform init \
            -backend-config="resource_group_name=$TF_BACKEND_RESOURCE_GROUP" \
            -backend-config="storage_account_name=$TF_BACKEND_STORAGE_ACCOUNT" \
            -backend-config="container_name=$TF_BACKEND_CONTAINER" \
            -backend-config="key=$TF_BACKEND_KEY"

      - name: Terraform Validate
        working-directory: terraform/postgres
        run: terraform validate

      - name: Terraform Plan
        if: github.event.inputs.action == 'plan' || github.event.inputs.action == 'apply' || github.event.inputs.action == 'full'
        working-directory: terraform/postgres
        run: terraform plan -no-color -input=false

      - name: Terraform Apply (Create Azure PostgreSQL)
        if: github.event.inputs.action == 'apply' || github.event.inputs.action == 'full'
        working-directory: terraform/postgres
        run: terraform apply -auto-approve -no-color -input=false

      - name: Note (full = apply only; ingest from Databricks)
        if: github.event.inputs.action == 'full'
        run: |
          echo "::notice::PostgreSQL is private (base VNet). Run ingestion from a Databricks notebook/job in the same workspace, then run this workflow with action 'destroy' when done."
          terraform -chdir=terraform/postgres output -json 2>/dev/null || true

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        working-directory: terraform/postgres
        run: terraform destroy -auto-approve -no-color -input=false
