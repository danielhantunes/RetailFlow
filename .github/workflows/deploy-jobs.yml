name: Deploy Databricks Jobs
on:
  workflow_dispatch:

jobs:
  deploy-jobs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy job definition
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          # Main pipeline job (RetailFlow_Main_Pipeline) is provisioned by Terraform (terraform/databricks/databricks_resources.tf). This workflow is for optional ad-hoc job deploy via API if needed.
          echo "Job is managed by Terraform; use terraform-databricks-dev workflow to apply/destroy."
