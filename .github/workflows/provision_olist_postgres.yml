# Single workflow for Olist PostgreSQL: Terraform (plan/apply/destroy), register runner, and load data.
# action: plan | apply | destroy | full (apply + register + load) | register_only | bootstrap_only.
# full and bootstrap_only = no POSTGRES_* secrets (connection from Terraform state/outputs). Optional: set POSTGRES_* if state unavailable.
# Sequence: plan -> apply -> register_only -> bootstrap_only -> destroy. Run Terraform Base (Dev) apply first. GH_PAT for full and register_only.

name: Provision PostgreSQL for Olist
on:
  workflow_dispatch:
    inputs:
      action:
        description: 'What to run'
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
          - full
          - register_only
          - bootstrap_only
        default: plan
      resource_group:
        description: 'Resource group for bootstrap VM (register/full)'
        required: false
        default: 'retailflow-dev-rg'
      vm_name:
        description: 'Bootstrap VM name (register/full)'
        required: false
        default: 'retailflow-dev-bootstrap-vm'

permissions:
  id-token: write
  contents: read

concurrency:
  group: provision-olist-pg-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_VERSION: "1.5.0"
  ARM_USE_OIDC: true
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  # Remote state backend (same storage as dev; separate state key)
  TF_BACKEND_RESOURCE_GROUP: retailflow-dev-tfstate-rg
  TF_BACKEND_STORAGE_ACCOUNT: retailflowdevtfstate
  TF_BACKEND_CONTAINER: tfstate
  TF_BACKEND_KEY: retailflow-ingest-pg.tfstate
  # Read base state (delegated subnet + private DNS). Run Terraform Base (Dev) apply first.
  TF_VAR_tfstate_resource_group_name: retailflow-dev-tfstate-rg
  TF_VAR_tfstate_storage_account_name: retailflowdevtfstate
  TF_VAR_tfstate_container_name: tfstate
  TF_VAR_tfstate_base_key: retailflow-dev-base.tfstate
  RUNNER_VERSION: '2.321.0'

jobs:
  postgres:
    name: Terraform ${{ github.event.inputs.action }}
    runs-on: ubuntu-latest
    outputs:
      postgres_host: ${{ steps.tf-outputs.outputs.postgres_host }}
      postgres_user: ${{ steps.tf-outputs.outputs.postgres_user }}
      postgres_password: ${{ steps.tf-outputs.outputs.postgres_password }}
    steps:
      - name: Skip Terraform (register_only)
        if: github.event.inputs.action == 'register_only'
        run: echo "Skipping Terraform. Register job will run."

      - name: Checkout
        if: github.event.inputs.action != 'register_only'
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        if: github.event.inputs.action != 'register_only'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        if: github.event.inputs.action != 'register_only'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init (PostgreSQL)
        if: github.event.inputs.action != 'register_only'
        working-directory: terraform/postgres
        run: |
          echo "==> Initializing Terraform (backend: $TF_BACKEND_RESOURCE_GROUP / $TF_BACKEND_KEY)"
          terraform init \
            -backend-config="resource_group_name=$TF_BACKEND_RESOURCE_GROUP" \
            -backend-config="storage_account_name=$TF_BACKEND_STORAGE_ACCOUNT" \
            -backend-config="container_name=$TF_BACKEND_CONTAINER" \
            -backend-config="key=$TF_BACKEND_KEY"

      - name: Terraform Validate
        if: github.event.inputs.action != 'register_only' && github.event.inputs.action != 'bootstrap_only'
        working-directory: terraform/postgres
        run: terraform validate

      - name: Terraform Plan
        if: github.event.inputs.action != 'register_only' && github.event.inputs.action != 'bootstrap_only' && (github.event.inputs.action == 'plan' || github.event.inputs.action == 'apply' || github.event.inputs.action == 'full')
        working-directory: terraform/postgres
        run: terraform plan -no-color -input=false

      - name: Terraform Apply (Create Azure PostgreSQL)
        if: github.event.inputs.action == 'apply' || github.event.inputs.action == 'full'
        working-directory: terraform/postgres
        run: terraform apply -auto-approve -no-color -input=false

      - name: Capture Terraform outputs (full = after apply; bootstrap_only = from state)
        id: tf-outputs
        if: github.event.inputs.action == 'apply' || github.event.inputs.action == 'full' || github.event.inputs.action == 'bootstrap_only'
        working-directory: terraform/postgres
        run: |
          echo "postgres_host=$(terraform output -raw postgres_host)" >> "$GITHUB_OUTPUT"
          echo "postgres_user=$(terraform output -raw postgres_user)" >> "$GITHUB_OUTPUT"
          echo "postgres_password=$(terraform output -raw postgres_password)" >> "$GITHUB_OUTPUT"

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        working-directory: terraform/postgres
        run: terraform destroy -auto-approve -no-color -input=false

  register:
    name: Install runner on VM
    if: github.event.inputs.action == 'full' || github.event.inputs.action == 'register_only' || github.event.inputs.action == 'bootstrap_only'
    needs: [postgres]
    runs-on: ubuntu-latest
    steps:
      - name: Skip (bootstrap_only)
        if: github.event.inputs.action == 'bootstrap_only'
        run: echo "Skipping runner install. Bootstrap job will use connection from Terraform state."

      - name: Checkout
        if: github.event.inputs.action != 'bootstrap_only'
        uses: actions/checkout@v4

      - name: Get runner registration token
        if: github.event.inputs.action != 'bootstrap_only'
        id: get-token
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [[ -z "$GH_PAT" ]]; then
            echo "::error::Add secret GH_PAT (PAT with repo admin) to create a registration token."
            exit 1
          fi
          RES=$(curl -sSf -X POST \
            -H "Authorization: token $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runners/registration-token")
          TOKEN=$(echo "$RES" | jq -r '.token')
          if [[ -z "$TOKEN" || "$TOKEN" == "null" ]]; then
            echo "::error::Failed to create registration token. Check GH_PAT has repo admin."
            echo "$RES" | jq .
            exit 1
          fi
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Azure Login (OIDC)
        if: github.event.inputs.action != 'bootstrap_only'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install runner on VM (Run Command)
        if: github.event.inputs.action != 'bootstrap_only'
        env:
          REG_TOKEN: ${{ steps.get-token.outputs.token }}
          REPO: ${{ github.repository }}
          RUNNER_VER: ${{ env.RUNNER_VERSION }}
          RESOURCE_GROUP: ${{ github.event.inputs.resource_group }}
          VM_NAME: ${{ github.event.inputs.vm_name }}
        run: |
          SCRIPT_B64=$(base64 -w0 scripts/install_github_runner.sh)
          printf 'export RUNNER_TOKEN=%s\nexport REPO=%s\nexport RUNNER_VERSION=%s\necho %s | base64 -d | bash\n' \
            "$(printf '%q' "$REG_TOKEN")" \
            "$(printf '%q' "$REPO")" \
            "$(printf '%q' "$RUNNER_VER")" \
            "$SCRIPT_B64" > /tmp/vm_script.sh
          echo "Running installer on VM $VM_NAME in $RESOURCE_GROUP..."
          az vm run-command invoke \
            --resource-group "$RESOURCE_GROUP" \
            --name "$VM_NAME" \
            --command-id RunShellScript \
            --scripts "$(cat /tmp/vm_script.sh)" \
            --query 'value[0].message' -o tsv

      - name: Ensure runner service is running (restart and show status)
        if: github.event.inputs.action != 'bootstrap_only'
        env:
          RESOURCE_GROUP: ${{ github.event.inputs.resource_group }}
          VM_NAME: ${{ github.event.inputs.vm_name }}
        run: |
          echo "Restarting runner service and checking status on VM..."
          az vm run-command invoke \
            --resource-group "$RESOURCE_GROUP" \
            --name "$VM_NAME" \
            --command-id RunShellScript \
            --scripts "sudo systemctl restart actions-runner-retailflow.service; sleep 3; sudo systemctl status actions-runner-retailflow.service --no-pager; echo '---'; sudo journalctl -u actions-runner-retailflow.service -n 15 --no-pager" \
            --query 'value[0].message' -o tsv
          echo "If the runner still shows Offline in GitHub, check the status above for errors (e.g. Must not run with sudo, network). Ensure the VM has outbound internet to reach GitHub."

      - name: Verify runner and next step (register_only / full)
        if: github.event.inputs.action != 'bootstrap_only'
        run: |
          if [ "${{ github.event.inputs.action }}" = "register_only" ]; then
            echo "::notice::Runner install finished. In GitHub: Settings → Actions → Runners, wait until a runner with labels 'self-hosted, linux' shows status **Idle**. Then run this workflow again with action **bootstrap_only**."
          else
            echo "::notice::Runner install finished. The **Load dataset into Postgres** job will run next in this workflow on the same runner."
          fi

  bootstrap:
    name: Load dataset into Postgres
    if: github.event.inputs.action == 'full' || github.event.inputs.action == 'bootstrap_only'
    needs: [postgres, register]
    runs-on: [self-hosted, linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set connection (from Terraform state/outputs or secrets)
        env:
          OUT_HOST: ${{ needs.postgres.outputs.postgres_host }}
          OUT_USER: ${{ needs.postgres.outputs.postgres_user }}
          OUT_PASS: ${{ needs.postgres.outputs.postgres_password }}
          SECRET_HOST: ${{ secrets.POSTGRES_HOST }}
          SECRET_USER: ${{ secrets.POSTGRES_USER }}
          SECRET_PASS: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          if [ -n "$OUT_HOST" ]; then
            echo "PGHOST=$OUT_HOST" >> "$GITHUB_ENV"
            echo "PGUSER=$OUT_USER" >> "$GITHUB_ENV"
            echo "PGPASSWORD=$OUT_PASS" >> "$GITHUB_ENV"
          else
            echo "PGHOST=$SECRET_HOST" >> "$GITHUB_ENV"
            echo "PGUSER=$SECRET_USER" >> "$GITHUB_ENV"
            echo "PGPASSWORD=$SECRET_PASS" >> "$GITHUB_ENV"
          fi
          echo "PGDATABASE=postgres" >> "$GITHUB_ENV"

      - name: Install PostgreSQL client (runner VM)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client unzip

      - name: Install toolbox (runner VM)
        run: |
          chmod +x scripts/toolbox_setup.sh
          ./scripts/toolbox_setup.sh

      - name: Verify PostgreSQL connectivity
        run: |
          echo "Checking connection to PostgreSQL..."
          psql -c "SELECT 1 AS connected;" || { echo "Cannot connect to PostgreSQL. Check runner is in the same VNet as Postgres. For bootstrap_only, run apply first so state has outputs; or set POSTGRES_* secrets."; exit 1; }
          echo "PostgreSQL connection OK."

      - name: Ensure database and tables exist
        run: |
          psql -d postgres -c "SELECT 1 FROM pg_database WHERE datname = 'retailflow';" -t | grep -q 1 || psql -d postgres -c "CREATE DATABASE retailflow;"
          psql -d retailflow -f sql/create_tables.sql
          echo "Schema ready."

      - name: Prepare dataset directory
        run: |
          if [[ -d dataset && -n "$(ls -A dataset 2>/dev/null)" ]]; then
            echo "Using existing dataset/ contents."
          elif [[ -f "databaseinput/Brazilian E-Commerce Public Dataset.zip" ]]; then
            echo "Unzipping Olist dataset and renaming to expected filenames..."
            mkdir -p dataset
            unzip -o -q "databaseinput/Brazilian E-Commerce Public Dataset.zip" -d dataset
            for f in dataset/olist_*_dataset.csv; do
              [[ -f "$f" ]] || continue
              base=$(basename "$f" .csv)
              base="${base#olist_}"
              base="${base%_dataset}"
              mv "$f" "dataset/${base}.csv" && echo "  -> ${base}.csv"
            done
          else
            echo "No dataset/ or ZIP found. Add dataset/*.csv or databaseinput/Brazilian E-Commerce Public Dataset.zip"
            exit 1
          fi

      - name: Load dataset (COPY from CSV)
        env:
          POSTGRES_HOST: ${{ env.PGHOST }}
          POSTGRES_USER: ${{ env.PGUSER }}
          POSTGRES_PASSWORD: ${{ env.PGPASSWORD }}
          PGDATABASE: retailflow
        run: |
          chmod +x scripts/load_olist.sh
          ./scripts/load_olist.sh dataset
