# Layer 2 – Databricks ONLY (dev)
# Provisions: Azure Databricks Workspace (retailflow-dev-dbw), dev cluster (single-node), and main pipeline job.
# Depends on base; run terraform-base-dev.yml first.
# Databricks auth: same Azure AD Service Principal (add app to workspace; use ARM_CLIENT_SECRET for Databricks provider). See docs/DATABRICKS_AZURE_AUTH.md.

name: Terraform Databricks (Dev)
on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action'
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
        default: plan

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-databricks-dev-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_VERSION: '1.5.0'
  # AzureRM provider (OIDC) and Databricks provider (same Azure AD SP with client secret)
  ARM_USE_OIDC: true
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  # Remote state backend (dev)
  TF_BACKEND_RESOURCE_GROUP: retailflow-dev-tfstate-rg
  TF_BACKEND_STORAGE_ACCOUNT: retailflowdevtfstate
  TF_BACKEND_CONTAINER: tfstate
  TF_BACKEND_KEY: retailflow-dev-databricks.tfstate
  # For remote_state data source (read base layer state)
  TF_VAR_tfstate_resource_group_name: retailflow-dev-tfstate-rg
  TF_VAR_tfstate_storage_account_name: retailflowdevtfstate
  TF_VAR_tfstate_container_name: tfstate
  TF_VAR_tfstate_base_key: retailflow-dev-base.tfstate
  # Grant this SP Contributor on the workspace so it can use the Databricks API (no manual add). Set AZURE_PRINCIPAL_ID in repo secrets (Object ID of the Azure AD app).
  TF_VAR_azure_principal_id: ${{ secrets.AZURE_PRINCIPAL_ID }}

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/databricks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          echo "==> Initializing Terraform (backend: $TF_BACKEND_RESOURCE_GROUP / $TF_BACKEND_KEY)"
          terraform init \
            -backend-config="resource_group_name=$TF_BACKEND_RESOURCE_GROUP" \
            -backend-config="storage_account_name=$TF_BACKEND_STORAGE_ACCOUNT" \
            -backend-config="container_name=$TF_BACKEND_CONTAINER" \
            -backend-config="key=$TF_BACKEND_KEY"

      - name: Terraform Validate
        run: |
          echo "==> Validating configuration"
          terraform validate

      - name: Terraform Plan
        if: github.event.inputs.action == 'plan' || github.event.inputs.action == 'apply'
        run: |
          echo "==> Running terraform plan"
          terraform plan -no-color -input=false

      - name: Terraform Apply (workspace)
        if: github.event.inputs.action == 'apply'
        run: |
          echo "==> Applying: workspace first (job and cluster created on second apply when host is set)"
          terraform apply -auto-approve -no-color -input=false

      - name: Set Databricks host and workspace resource ID from output
        if: github.event.inputs.action == 'apply'
        id: workspace_outputs
        run: |
          URL=$(terraform output -raw workspace_url 2>/dev/null || echo "")
          RID=$(terraform output -raw workspace_id 2>/dev/null || echo "")
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "workspace_resource_id=$RID" >> $GITHUB_OUTPUT
          echo "workspace_url=$URL" "workspace_id=$RID"

      - name: Terraform Apply (job and dev cluster)
        if: github.event.inputs.action == 'apply' && steps.workspace_outputs.outputs.url != ''
        env:
          TF_VAR_databricks_host: ${{ steps.workspace_outputs.outputs.url }}
          TF_VAR_databricks_workspace_resource_id: ${{ steps.workspace_outputs.outputs.workspace_resource_id }}
          DATABRICKS_HOST: ${{ steps.workspace_outputs.outputs.url }}
        run: |
          echo "==> Applying: job (RetailFlow_Main_Pipeline) and dev cluster (retailflow-dev-single-node)"
          terraform apply -auto-approve -no-color -input=false

      - name: Set Databricks host and workspace resource ID for destroy
        if: github.event.inputs.action == 'destroy'
        id: workspace_destroy
        run: |
          URL=$(terraform output -raw workspace_url 2>/dev/null || echo "")
          RID=$(terraform output -raw workspace_id 2>/dev/null || echo "")
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "workspace_resource_id=$RID" >> $GITHUB_OUTPUT

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        env:
          TF_VAR_databricks_host: ${{ steps.workspace_destroy.outputs.url }}
          TF_VAR_databricks_workspace_resource_id: ${{ steps.workspace_destroy.outputs.workspace_resource_id }}
          DATABRICKS_HOST: ${{ steps.workspace_destroy.outputs.url }}
        run: |
          echo "==> Destroying job, cluster, and workspace"
          terraform destroy -auto-approve -no-color -input=false
